laws:
  - id: "CIA-15"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제15조"
    name_en: "Credit Information Act Article 15 (Principles of Collection and Investigation)"
    summary: "Credit information collection and investigation may require adherence to proportionality and purpose limitation principles; possible risk where collection exceeds permitted scope or lacks proper legal basis"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제15조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제15조(수집ㆍ조사의 원칙)
      ① 신용정보회사등은 신용정보를 수집ㆍ조사하는 경우에는 이 법 또는 정관으로 정한 업무 범위에서 수집ㆍ조사 목적을 명확히 하고, 그 목적 달성에 필요한 최소한의 범위에서 합리적이고 공정한 수단을 사용하여 신용정보를 수집ㆍ조사하여야 한다.
      ② 신용정보회사등은 신용정보의 수집ㆍ조사를 할 때에는 신용정보주체의 동의를 받거나 그 밖에 이 법에서 정하는 절차에 따라야 한다.
      ③ 신용정보회사등은 신용정보를 수집할 때에는 「개인정보 보호법」 등 관계 법령에서 정하는 바에 따라 적법하고 정당한 방법으로 수집하여야 하며, 허위 또는 사기적인 방법으로 수집하여서는 아니 된다.
      ④ 신용정보회사등은 개인신용정보를 수집하는 경우에는 해당 신용정보주체에게 수집 목적, 수집 항목 및 그 밖에 대통령령으로 정하는 사항을 알려야 한다.

  - id: "CIA-17"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제17조"
    name_en: "Credit Information Act Article 17 (Prohibition on Disclosure Beyond Business Purpose)"
    summary: "Credit information obtained in the course of business may not be disclosed or used for purposes other than those permitted; possible risk where credit data is shared outside authorized channels or used beyond stated business purpose"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제17조"
    risk_level: "HIGH"
    full_text_ko: |
      제17조(업무 목적 외 누설금지 등)
      ① 신용정보회사등과 그 임직원이거나 임직원이었던 자 및 신용정보회사등으로부터 신용정보를 제공받은 자는 그 업무상 알게 된 타인의 신용정보를 업무 목적 외에 누설하거나 이용하여서는 아니 된다.
      ② 신용정보회사등은 임직원이 제1항을 위반하여 신용정보를 누설하거나 이용하지 아니하도록 내부통제 기준 및 절차를 마련하고 이를 준수하여야 한다.
      ③ 누구든지 신용정보회사등의 임직원 또는 그 임직원이었던 자에게 업무 목적 외 신용정보의 누설 또는 이용을 요청하거나 이를 교사(敎唆)하여서는 아니 된다.
      ④ 제1항을 위반하여 신용정보를 누설하거나 이용한 자는 형사처벌의 대상이 될 수 있으며, 해당 신용정보주체는 손해배상을 청구할 수 있다.

  - id: "CIA-19"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제19조"
    name_en: "Credit Information Act Article 19 (Security Protection of Credit Information Computer Systems)"
    summary: "Credit information computer systems may require technical and managerial security measures; possible risk where systems storing or processing credit data lack adequate access controls, encryption, or intrusion prevention"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제19조"
    risk_level: "HIGH"
    full_text_ko: |
      제19조(신용정보전산시스템의 안전보호)
      ① 신용정보회사등은 신용정보전산시스템(신용정보를 수집ㆍ처리ㆍ보관ㆍ전송하는 데 이용되는 전산시스템을 말한다. 이하 같다)에 대한 제3자의 불법적인 접근, 입력된 정보의 변경ㆍ훼손 및 파괴, 그 밖의 위험에 대하여 대통령령으로 정하는 바에 따라 기술적ㆍ물리적ㆍ관리적 보안대책을 수립ㆍ시행하여야 한다.
      ② 신용정보회사등은 신용정보전산시스템에 대한 접근권한을 업무 수행에 필요한 최소한의 범위로 제한하여야 하고, 접근권한의 부여ㆍ변경ㆍ말소에 관한 내역을 보관하여야 한다.
      ③ 신용정보회사등은 신용정보전산시스템에 대한 접속 기록을 일정 기간 보존하고, 위조ㆍ변조ㆍ도난ㆍ분실되지 아니하도록 관리하여야 한다.
      ④ 신용정보회사등은 개인신용정보를 전산으로 처리하는 경우 암호화 등 안전성 확보에 필요한 조치를 하여야 한다.
      ⑤ 신용정보전산시스템의 보안에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-20"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제20조"
    name_en: "Credit Information Act Article 20 (Maintenance of Accuracy and Currency of Credit Information)"
    summary: "Credit information may require ongoing updates to remain accurate and current; possible risk where systems retain outdated, incomplete, or erroneous credit data without procedures for correction or deletion"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제20조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제20조(신용정보의 정확성 및 최신성의 유지)
      ① 신용정보회사등은 신용정보의 정확성과 최신성이 유지될 수 있도록 대통령령으로 정하는 바에 따라 신용정보를 최신의 상태로 유지하여야 한다.
      ② 신용정보회사등은 처리하는 신용정보가 사실과 다를 경우 이를 정확하게 정정하거나 삭제하는 등 필요한 조치를 하여야 한다.
      ③ 신용정보회사등은 신용정보의 보유 목적이 달성되었거나 보유 기간이 경과한 경우에는 해당 신용정보를 지체 없이 삭제하여야 한다. 다만, 다른 법령에 따라 보존하여야 하는 경우에는 그러하지 아니하다.
      ④ 신용정보회사등은 신용정보주체가 신용정보의 정정 또는 삭제를 요청하는 경우 이를 신속히 처리하고 그 결과를 해당 신용정보주체에게 알려야 한다.
      ⑤ 신용정보의 정확성 유지에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-32"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제32조"
    name_en: "Credit Information Act Article 32 (Consent for Provision and Use of Personal Credit Information)"
    summary: "Providing or using personal credit information generally may require prior consent from the subject; possible risk where personal credit data is shared with third parties or used for marketing without valid, informed consent"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제32조"
    risk_level: "HIGH"
    full_text_ko: |
      제32조(개인신용정보의 제공ㆍ활용에 대한 동의)
      ① 신용정보제공ㆍ이용자가 개인신용정보를 타인에게 제공하려는 경우에는 대통령령으로 정하는 바에 따라 해당 신용정보주체로부터 다음 각 호의 사항에 대하여 개별적으로 동의를 받아야 한다.
        1. 1.  개인신용정보를 제공받는 자
        2. 2.  개인신용정보를 제공받는 자의 이용 목적
        3. 3.  제공하는 개인신용정보의 내용
        4. 4.  개인신용정보를 제공받는 자의 보유 및 이용 기간
        5. 5.  동의를 거부할 권리가 있다는 사실 및 동의 거부에 따른 불이익의 내용(불이익이 있는 경우에 한한다)
      ② 신용정보제공ㆍ이용자가 개인신용정보를 마케팅 목적으로 활용하려는 경우에는 제1항에 따른 동의 외에 별도로 해당 신용정보주체의 동의를 받아야 한다.
      ③ 신용정보제공ㆍ이용자가 제1항 및 제2항에 따른 동의를 받을 때에는 해당 신용정보주체가 그 내용을 충분히 이해할 수 있도록 명확하게 설명하여야 한다.
      ④ 신용정보제공ㆍ이용자는 신용정보주체가 동의한 범위를 초과하여 개인신용정보를 이용하거나 제3자에게 제공하여서는 아니 된다.
      ⑤ 제1항부터 제4항까지의 규정에도 불구하고 동의의 방법ㆍ절차 등에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-33"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제33조"
    name_en: "Credit Information Act Article 33 (Use of Personal Credit Information)"
    summary: "Personal credit information may only be used within the scope of the original purpose; possible risk where credit data is processed or analysed for secondary purposes beyond the consent or legal basis under which it was collected"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제33조"
    risk_level: "HIGH"
    full_text_ko: |
      제33조(개인신용정보의 이용)
      ① 개인신용정보는 다음 각 호의 어느 하나에 해당하는 경우에만 이용하여야 한다.
        1. 1.  해당 신용정보주체가 신청한 금융거래 등 상거래관계의 설정 및 유지 여부 등을 판단하기 위한 목적으로 이용하는 경우
        2. 2.  제32조제1항에 따라 신용정보주체로부터 동의를 받은 목적으로 이용하는 경우
        3. 3.  다른 법률에 따라 불가피하게 이용하여야 하는 경우
      ② 신용정보제공ㆍ이용자는 개인신용정보를 제1항에서 정한 목적 범위를 초과하여 이용하거나 제3자에게 제공하여서는 아니 된다.
      ③ 신용정보제공ㆍ이용자는 개인신용정보를 이용하는 경우 해당 정보가 정확하고 최신의 상태로 유지될 수 있도록 필요한 조치를 하여야 한다.
      ④ 개인신용정보의 이용 범위에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-34"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제34조"
    name_en: "Credit Information Act Article 34 (Provision and Use of Personal Credit Information)"
    summary: "Sharing personal credit information with third parties may require a valid legal basis or explicit consent; possible risk where credit data is transferred to affiliates, service providers, or overseas entities without proper authorization"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제34조"
    risk_level: "HIGH"
    full_text_ko: |
      제34조(개인신용정보의 제공ㆍ이용)
      ① 신용정보제공ㆍ이용자가 다른 신용정보제공ㆍ이용자 또는 그 밖의 자에게 개인신용정보를 제공하는 경우에는 제32조에 따른 동의를 받거나 이 법에서 정하는 다른 요건을 충족하여야 한다.
      ② 신용정보회사등은 개인신용정보를 제공하는 경우 제공받는 자가 해당 신용정보를 목적 범위 내에서만 이용하도록 필요한 조치를 하여야 한다.
      ③ 개인신용정보를 국외로 제공하는 경우에는 신용정보주체의 동의를 받아야 하며, 대통령령으로 정하는 바에 따라 국외 이전에 관한 사항을 신용정보주체에게 알려야 한다.
      ④ 신용정보제공ㆍ이용자는 개인신용정보를 제공받은 자가 해당 정보를 오ㆍ남용하지 아니하도록 관리ㆍ감독하여야 한다.
      ⑤ 신용정보의 제공ㆍ이용에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-38"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제38조"
    name_en: "Credit Information Act Article 38 (Protection of Credit Information)"
    summary: "Subjects of personal credit information have rights to access and correct their data; possible risk where systems lack mechanisms allowing subjects to verify, dispute, or request deletion of their credit records"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제38조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제38조(신용정보의 보호)
      ① 신용정보주체는 신용정보회사등에 대하여 자신의 개인신용정보를 열람하거나 제공할 것을 청구할 수 있다.
      ② 신용정보주체는 신용정보회사등이 보유하고 있는 자신의 신용정보가 사실과 다른 경우에는 해당 신용정보회사등에 그 정정을 청구할 수 있다.
      ③ 신용정보회사등은 제2항에 따른 정정 청구를 받은 경우에는 이를 조사하고 그 결과를 청구한 신용정보주체에게 알려야 한다.
      ④ 신용정보주체는 신용정보회사등에 자신의 신용정보의 이용 및 제공 현황을 조회할 수 있으며, 신용정보회사등은 이를 지원하기 위한 조회 시스템을 구축하여야 한다.
      ⑤ 신용정보주체는 신용정보회사등에 자신의 개인신용정보의 삭제를 요청할 수 있으며, 신용정보회사등은 다른 법령에 특별한 규정이 없는 한 이에 응하여야 한다.
      ⑥ 제1항부터 제5항까지의 규정에 따른 청구 절차 및 방법에 관하여 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-39"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제39조"
    name_en: "Credit Information Act Article 39 (Notification and Reporting of Credit Information Leakage)"
    summary: "Leakage or unauthorized access to personal credit information may require timely notification to affected subjects and reporting to authorities; possible risk where breach response procedures are absent or delayed beyond regulatory timeframes"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제39조"
    risk_level: "HIGH"
    full_text_ko: |
      제39조(신용정보 유출등의 통지ㆍ신고)
      ① 신용정보회사등은 개인신용정보가 분실ㆍ도난ㆍ유출(이하 이 조에서 "유출등"이라 한다)되었음을 알게 된 때에는 지체 없이 해당 신용정보주체에게 다음 각 호의 사항을 알려야 한다. 다만, 신용정보주체의 연락처를 알 수 없는 경우 등 정당한 사유가 있는 경우에는 대통령령으로 정하는 바에 따라 통지를 갈음하는 조치를 취할 수 있다.
        1. 1.  유출등이 된 개인신용정보의 항목
        2. 2.  유출등이 발생한 시점과 그 경위
        3. 3.  유출등으로 인하여 발생할 수 있는 피해를 최소화하기 위하여 신용정보주체가 할 수 있는 방법 등에 관한 정보
        4. 4.  신용정보회사등의 대응조치 및 피해 구제절차
        5. 5.  신용정보주체에게 피해가 발생한 경우 신고 등을 접수할 수 있는 담당부서 및 연락처
      ② 신용정보회사등은 개인신용정보가 유출등이 된 경우 그 피해를 최소화하기 위한 대책을 마련하고 필요한 조치를 하여야 한다.
      ③ 신용정보회사등은 개인신용정보의 유출등이 있음을 알게 된 때에는 대통령령으로 정하는 규모 이상인 경우 지체 없이 금융위원회 또는 금융감독원에 신고하여야 한다.
      ④ 제1항에 따른 통지 및 제3항에 따른 신고의 시기, 방법, 절차 등에 필요한 사항은 대통령령으로 정한다.

  - id: "CIA-40"
    name_ko: "신용정보의 이용 및 보호에 관한 법률 제40조"
    name_en: "Credit Information Act Article 40 (Rights of Credit Information Subjects)"
    summary: "Credit information subjects have rights including access, correction, deletion, and withdrawal of consent; possible risk where applications or systems do not provide mechanisms to honour these rights or lack documented procedures for processing subject requests"
    url: "https://www.law.go.kr/법령/신용정보의이용및보호에관한법률/제40조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제40조(신용정보주체의 권리)
      ① 신용정보주체는 신용정보회사등에 대하여 다음 각 호의 권리를 행사할 수 있다.
        1. 1.  자신의 개인신용정보의 처리에 대하여 열람을 청구할 권리
        2. 2.  자신의 개인신용정보가 사실과 다른 경우 정정 또는 삭제를 청구할 권리
        3. 3.  자신의 개인신용정보의 처리를 정지하거나 삭제할 것을 요청할 권리
        4. 4.  자신의 개인신용정보의 처리에 대하여 동의한 내용을 철회할 권리
        5. 5.  자신의 개인신용정보의 이용 및 제공 현황을 조회할 권리
        6. 6.  자동화된 의사결정에만 기초하여 이루어진 신용평가에 대하여 설명을 요구하거나 재심사를 청구할 권리
      ② 신용정보회사등은 제1항에 따른 신용정보주체의 권리행사를 이유로 해당 신용정보주체에게 재화 또는 서비스의 제공을 거부하거나 불이익을 주어서는 아니 된다.
      ③ 신용정보회사등은 신용정보주체가 권리를 행사할 수 있도록 담당 부서를 지정하고, 그 연락처 및 권리행사 방법을 해당 신용정보주체가 쉽게 알 수 있도록 공개하여야 한다.
      ④ 제1항에 따른 권리행사의 방법, 절차 및 처리 기한 등에 관하여 필요한 사항은 대통령령으로 정한다.
