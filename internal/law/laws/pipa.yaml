laws:
  - id: "PIPA-15"
    name_ko: "개인정보 보호법 제15조"
    name_en: "PIPA Article 15 (Collection and Use of Personal Information)"
    summary: "Requires consent or legal basis before collecting personal information"
    url: "https://www.law.go.kr/법령/개인정보보호법/제15조"
    risk_level: "HIGH"
    full_text_ko: |
      제15조(개인정보의 수집ㆍ이용)
      ① 개인정보처리자는 다음 각 호의 어느 하나에 해당하는 경우에는 개인정보를 수집할 수 있으며 그 수집 목적의 범위에서 이용할 수 있다. <개정 2023.3.14>
        1. 1.  정보주체의 동의를 받은 경우
        2. 2.  법률에 특별한 규정이 있거나 법령상 의무를 준수하기 위하여 불가피한 경우
        3. 3.  공공기관이 법령 등에서 정하는 소관 업무의 수행을 위하여 불가피한 경우
        4. 4.  정보주체와 체결한 계약을 이행하거나 계약을 체결하는 과정에서 정보주체의 요청에 따른 조치를 이행하기 위하여 필요한 경우
        5. 5.  명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우
        6. 6.  개인정보처리자의 정당한 이익을 달성하기 위하여 필요한 경우로서 명백하게 정보주체의 권리보다 우선하는 경우. 이 경우 개인정보처리자의 정당한 이익과 상당한 관련이 있고 합리적인 범위를 초과하지 아니하는 경우에 한한다.
        7. 7.  공중위생 등 공공의 안전과 안녕을 위하여 긴급히 필요한 경우
      ② 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다. 다음 각 호의 어느 하나의 사항을 변경하는 경우에도 이를 알리고 동의를 받아야 한다.
        1. 1.  개인정보의 수집ㆍ이용 목적
        2. 2.  수집하려는 개인정보의 항목
        3. 3.  개인정보의 보유 및 이용 기간
        4. 4.  동의를 거부할 권리가 있다는 사실 및 동의 거부에 따른 불이익이 있는 경우에는 그 불이익의 내용
      ③ 개인정보처리자는 당초 수집 목적과 합리적으로 관련된 범위에서 정보주체에게 불이익이 발생하는지 여부, 암호화 등 안전성 확보에 필요한 조치를 하였는지 여부 등을 고려하여 대통령령으로 정하는 바에 따라 정보주체의 동의 없이 개인정보를 이용할 수 있다. <신설 2020.2.4>

  - id: "PIPA-17"
    name_ko: "개인정보 보호법 제17조"
    name_en: "PIPA Article 17 (Provision of Personal Information to Third Parties)"
    summary: "Requires consent before providing personal information to third parties"
    url: "https://www.law.go.kr/법령/개인정보보호법/제17조"
    risk_level: "HIGH"
    full_text_ko: |
      제17조(개인정보의 제공)
      ① 개인정보처리자는 다음 각 호의 어느 하나에 해당되는 경우에는 정보주체의 개인정보를 제3자에게 제공(공유를 포함한다. 이하 같다)할 수 있다. <개정 2020.2.4, 2023.3.14>
        1. 1.  정보주체의 동의를 받은 경우
        2. 2.  제15조제1항제2호, 제3호 및 제5호부터 제7호까지에 따라 개인정보를 수집한 목적 범위에서 개인정보를 제공하는 경우
      ② 개인정보처리자는 제1항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다. 다음 각 호의 어느 하나의 사항을 변경하는 경우에도 이를 알리고 동의를 받아야 한다.
        1. 1.  개인정보를 제공받는 자
        2. 2.  개인정보를 제공받는 자의 개인정보 이용 목적
        3. 3.  제공하는 개인정보의 항목
        4. 4.  개인정보를 제공받는 자의 개인정보 보유 및 이용 기간
        5. 5.  동의를 거부할 권리가 있다는 사실 및 동의 거부에 따른 불이익이 있는 경우에는 그 불이익의 내용
      ③ 삭제 <2023.3.14>
      ④ 개인정보처리자는 당초 수집 목적과 합리적으로 관련된 범위에서 정보주체에게 불이익이 발생하는지 여부, 암호화 등 안전성 확보에 필요한 조치를 하였는지 여부 등을 고려하여 대통령령으로 정하는 바에 따라 정보주체의 동의 없이 개인정보를 제공할 수 있다. <신설 2020.2.4>

  - id: "PIPA-18"
    name_ko: "개인정보 보호법 제18조"
    name_en: "PIPA Article 18 (Restriction on Use and Provision Beyond Purpose)"
    summary: "Restricts use of personal information beyond the original purpose of collection"
    url: "https://www.law.go.kr/법령/개인정보보호법/제18조"
    risk_level: "HIGH"
    full_text_ko: |
      제18조(개인정보의 목적 외 이용ㆍ제공 제한)
      ① 개인정보처리자는 개인정보를 제15조제1항에 따른 범위를 초과하여 이용하거나 제17조제1항 및 제28조의8제1항에 따른 범위를 초과하여 제3자에게 제공하여서는 아니 된다. <개정 2020.2.4, 2023.3.14>
      ② 제1항에도 불구하고 개인정보처리자는 다음 각 호의 어느 하나에 해당하는 경우에는 정보주체 또는 제3자의 이익을 부당하게 침해할 우려가 있을 때를 제외하고는 개인정보를 목적 외의 용도로 이용하거나 이를 제3자에게 제공할 수 있다. 다만, 제5호부터 제9호까지에 따른 경우는 공공기관의 경우로 한정한다. <개정 2020.2.4, 2023.3.14>
        1. 1.  정보주체로부터 별도의 동의를 받은 경우
        2. 2.  다른 법률에 특별한 규정이 있는 경우
        3. 3.  명백히 정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 필요하다고 인정되는 경우
        4. 4.  삭제 <2020.2.4>
        5. 5.  개인정보를 목적 외의 용도로 이용하거나 이를 제3자에게 제공하지 아니하면 다른 법률에서 정하는 소관 업무를 수행할 수 없는 경우로서 보호위원회의 심의ㆍ의결을 거친 경우
        6. 6.  조약, 그 밖의 국제협정의 이행을 위하여 외국정부 또는 국제기구에 제공하기 위하여 필요한 경우
        7. 7.  범죄의 수사와 공소의 제기 및 유지를 위하여 필요한 경우
        8. 8.  법원의 재판업무 수행을 위하여 필요한 경우
        9. 9.  형(刑) 및 감호, 보호처분의 집행을 위하여 필요한 경우
        10. 10.  공중위생 등 공공의 안전과 안녕을 위하여 긴급히 필요한 경우
      ③ 개인정보처리자는 제2항제1호에 따른 동의를 받을 때에는 다음 각 호의 사항을 정보주체에게 알려야 한다. 다음 각 호의 어느 하나의 사항을 변경하는 경우에도 이를 알리고 동의를 받아야 한다.
        1. 1.  개인정보를 제공받는 자
        2. 2.  개인정보의 이용 목적(제공 시에는 제공받는 자의 이용 목적을 말한다)
        3. 3.  이용 또는 제공하는 개인정보의 항목
        4. 4.  개인정보의 보유 및 이용 기간(제공 시에는 제공받는 자의 보유 및 이용 기간을 말한다)
        5. 5.  동의를 거부할 권리가 있다는 사실 및 동의 거부에 따른 불이익이 있는 경우에는 그 불이익의 내용
      ④ 공공기관은 제2항제2호부터 제6호까지, 제8호부터 제10호까지에 따라 개인정보를 목적 외의 용도로 이용하거나 이를 제3자에게 제공하는 경우에는 그 이용 또는 제공의 법적 근거, 목적 및 범위 등에 관하여 필요한 사항을 보호위원회가 고시로 정하는 바에 따라 관보 또는 인터넷 홈페이지 등에 게재하여야 한다. <개정 2013.3.23, 2014.11.19, 2017.7.26, 2020.2.4, 2023.3.14>
      ⑤ 개인정보처리자는 제2항 각 호의 어느 하나의 경우에 해당하여 개인정보를 목적 외의 용도로 제3자에게 제공하는 경우에는 개인정보를 제공받는 자에게 이용 목적, 이용 방법, 그 밖에 필요한 사항에 대하여 제한을 하거나, 개인정보의 안전성 확보를 위하여 필요한 조치를 마련하도록 요청하여야 한다. 이 경우 요청을 받은 자는 개인정보의 안전성 확보를 위하여 필요한 조치를 하여야 한다.

  - id: "PIPA-21"
    name_ko: "개인정보 보호법 제21조"
    name_en: "PIPA Article 21 (Destruction of Personal Information)"
    summary: "Requires destruction of personal information when retention period expires or purpose is achieved"
    url: "https://www.law.go.kr/법령/개인정보보호법/제21조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제21조(개인정보의 파기)
      ① 개인정보처리자는 보유기간의 경과, 개인정보의 처리 목적 달성, 가명정보의 처리 기간 경과 등 그 개인정보가 불필요하게 되었을 때에는 지체 없이 그 개인정보를 파기하여야 한다. 다만, 다른 법령에 따라 보존하여야 하는 경우에는 그러하지 아니하다. <개정 2023.3.14>
      ② 개인정보처리자가 제1항에 따라 개인정보를 파기할 때에는 복구 또는 재생되지 아니하도록 조치하여야 한다.
      ③ 개인정보처리자가 제1항 단서에 따라 개인정보를 파기하지 아니하고 보존하여야 하는 경우에는 해당 개인정보 또는 개인정보파일을 다른 개인정보와 분리하여서 저장ㆍ관리하여야 한다.
      ④ 개인정보의 파기방법 및 절차 등에 필요한 사항은 대통령령으로 정한다.

  - id: "PIPA-23"
    name_ko: "개인정보 보호법 제23조"
    name_en: "PIPA Article 23 (Restriction on Processing Sensitive Information)"
    summary: "Restricts processing of sensitive personal information without explicit consent"
    url: "https://www.law.go.kr/법령/개인정보보호법/제23조"
    risk_level: "HIGH"
    full_text_ko: |
      제23조(민감정보의 처리 제한)
      ①개인정보처리자는 사상ㆍ신념, 노동조합ㆍ정당의 가입ㆍ탈퇴, 정치적 견해, 건강, 성생활 등에 관한 정보, 그 밖에 정보주체의 사생활을 현저히 침해할 우려가 있는 개인정보로서 대통령령으로 정하는 정보(이하 "민감정보"라 한다)를 처리하여서는 아니 된다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는  그러하지 아니하다. <개정 2016.3.29>
        1. 1.  정보주체에게 제15조제2항 각 호 또는 제17조제2항 각 호의 사항을 알리고 다른 개인정보의 처리에 대한 동의와 별도로 동의를 받은 경우
        2. 2.  법령에서 민감정보의 처리를 요구하거나 허용하는 경우
      ② 개인정보처리자가 제1항 각 호에 따라 민감정보를 처리하는 경우에는 그 민감정보가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 제29조에 따른 안전성 확보에 필요한 조치를 하여야 한다. <신설 2016.3.29>
      ③ 개인정보처리자는 재화 또는 서비스를 제공하는 과정에서 공개되는 정보에 정보주체의 민감정보가 포함됨으로써 사생활 침해의 위험성이 있다고 판단하는 때에는 재화 또는 서비스의 제공 전에 민감정보의 공개 가능성 및 비공개를 선택하는 방법을 정보주체가 알아보기 쉽게 알려야 한다. <신설 2023.3.14>

  - id: "PIPA-24"
    name_ko: "개인정보 보호법 제24조"
    name_en: "PIPA Article 24 (Restriction on Processing Unique Identification Information)"
    summary: "Restricts processing of unique identification information unless specifically required by law"
    url: "https://www.law.go.kr/법령/개인정보보호법/제24조"
    risk_level: "HIGH"
    full_text_ko: |
      제24조(고유식별정보의 처리 제한)
      ① 개인정보처리자는 다음 각 호의 경우를 제외하고는 법령에 따라 개인을 고유하게 구별하기 위하여 부여된 식별정보로서 대통령령으로 정하는 정보(이하 "고유식별정보"라 한다)를 처리할 수 없다.
        1. 1.  정보주체에게 제15조제2항 각 호 또는 제17조제2항 각 호의 사항을 알리고 다른 개인정보의 처리에 대한 동의와 별도로 동의를 받은 경우
        2. 2.  법령에서 구체적으로 고유식별정보의 처리를 요구하거나 허용하는 경우
      ② 삭제 <2013.8.6>
      ③ 개인정보처리자가 제1항 각 호에 따라 고유식별정보를 처리하는 경우에는 그 고유식별정보가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 대통령령으로 정하는 바에 따라 암호화 등 안전성 확보에 필요한 조치를 하여야 한다. <개정 2015.7.24>
      ④ 보호위원회는 처리하는 개인정보의 종류ㆍ규모, 종업원 수 및 매출액 규모 등을 고려하여 대통령령으로 정하는 기준에 해당하는 개인정보처리자가 제3항에 따라 안전성 확보에 필요한 조치를 하였는지에 관하여 대통령령으로 정하는 바에 따라 정기적으로 조사하여야 한다. <신설 2016.3.29, 2017.7.26, 2020.2.4>
      ⑤ 보호위원회는 대통령령으로 정하는 전문기관으로 하여금 제4항에 따른 조사를 수행하게 할 수 있다. <신설 2016.3.29, 2017.7.26, 2020.2.4>

  - id: "PIPA-24-2"
    name_ko: "개인정보 보호법 제24조의2"
    name_en: "PIPA Article 24-2 (Restrictions on Resident Registration Numbers)"
    summary: "Prohibits processing resident registration numbers except where specifically permitted"
    url: "https://www.law.go.kr/법령/개인정보보호법/제24조의2"
    risk_level: "HIGH"
    full_text_ko: |
      제24조의2(주민등록번호 처리의 제한)
      ① 제24조제1항에도 불구하고 개인정보처리자는 다음 각 호의 어느 하나에 해당하는 경우를 제외하고는 주민등록번호를 처리할 수 없다. <개정 2014.11.19, 2016.3.29, 2017.7.26, 2020.2.4>
        1. 1.  법률ㆍ대통령령ㆍ국회규칙ㆍ대법원규칙ㆍ헌법재판소규칙ㆍ중앙선거관리위원회규칙 및 감사원규칙에서 구체적으로 주민등록번호의 처리를 요구하거나 허용한 경우
        2. 2.  정보주체 또는 제3자의 급박한 생명, 신체, 재산의 이익을 위하여 명백히 필요하다고 인정되는 경우
        3. 3.  제1호 및 제2호에 준하여 주민등록번호 처리가 불가피한 경우로서 보호위원회가 고시로 정하는 경우
      ② 개인정보처리자는 제24조제3항에도 불구하고 주민등록번호가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 암호화 조치를 통하여 안전하게 보관하여야 한다. 이 경우 암호화 적용 대상 및 대상별 적용 시기 등에 관하여 필요한 사항은 개인정보의 처리 규모와 유출 시 영향 등을 고려하여 대통령령으로 정한다. <신설 2014.3.24, 2015.7.24>
      ③ 개인정보처리자는 제1항 각 호에 따라 주민등록번호를 처리하는 경우에도 정보주체가 인터넷 홈페이지를 통하여 회원으로 가입하는 단계에서는 주민등록번호를 사용하지 아니하고도 회원으로 가입할 수 있는 방법을 제공하여야 한다. <개정 2014.3.24>
      ④ 보호위원회는 개인정보처리자가 제3항에 따른 방법을 제공할 수 있도록 관계 법령의 정비, 계획의 수립, 필요한 시설 및 시스템의 구축 등 제반 조치를 마련ㆍ지원할 수 있다. <개정 2014.3.24, 2017.7.26, 2020.2.4>

  - id: "PIPA-29"
    name_ko: "개인정보 보호법 제29조"
    name_en: "PIPA Article 29 (Duty of Safety Measures)"
    summary: "Requires technical, managerial, and physical measures to prevent data loss, theft, or leakage"
    url: "https://www.law.go.kr/법령/개인정보보호법/제29조"
    risk_level: "HIGH"
    full_text_ko: |
      제29조(안전조치의무) 개인정보처리자는 개인정보가 분실ㆍ도난ㆍ유출ㆍ위조ㆍ변조 또는 훼손되지 아니하도록 내부 관리계획 수립, 접속기록 보관 등 대통령령으로 정하는 바에 따라 안전성 확보에 필요한 기술적ㆍ관리적 및 물리적 조치를 하여야 한다. <개정 2015.7.24>

  - id: "PIPA-30"
    name_ko: "개인정보 보호법 제30조"
    name_en: "PIPA Article 30 (Privacy Policy)"
    summary: "Requires public disclosure of privacy policies"
    url: "https://www.law.go.kr/법령/개인정보보호법/제30조"
    risk_level: "MEDIUM"
    full_text_ko: |
      제30조(개인정보 처리방침의 수립 및 공개)
      ① 개인정보처리자는 다음 각 호의 사항이 포함된 개인정보의 처리 방침(이하 "개인정보 처리방침"이라 한다)을 정하여야 한다. 이 경우 공공기관은 제32조에 따라 등록대상이 되는 개인정보파일에 대하여 개인정보 처리방침을 정한다. <개정 2016.3.29, 2020.2.4, 2023.3.14>
        1. 1.  개인정보의 처리 목적
        2. 2.  개인정보의 처리 및 보유 기간
        3. 3.  개인정보의 제3자 제공에 관한 사항(해당되는 경우에만 정한다)
        3. 3의2.  개인정보의 파기절차 및 파기방법(제21조제1항 단서에 따라 개인정보를 보존하여야 하는 경우에는 그 보존근거와 보존하는 개인정보 항목을 포함한다)
        3. 3의3.  제23조제3항에 따른 민감정보의 공개 가능성 및 비공개를 선택하는 방법(해당되는 경우에만 정한다)
        4. 4.  개인정보처리의 위탁에 관한 사항(해당되는 경우에만 정한다)
        4. 4의2.  제28조의2 및 제28조의3에 따른 가명정보의 처리 등에 관한 사항(해당되는 경우에만 정한다)
        5. 5.  정보주체와 법정대리인의 권리ㆍ의무 및 그 행사방법에 관한 사항
        6. 6.  제31조에 따른 개인정보 보호책임자의 성명 또는 개인정보 보호업무 및 관련 고충사항을 처리하는 부서의 명칭과 전화번호 등 연락처
        7. 7.  인터넷 접속정보파일 등 개인정보를 자동으로 수집하는 장치의 설치ㆍ운영 및 그 거부에 관한 사항(해당하는 경우에만 정한다)
        8. 8.  그 밖에 개인정보의 처리에 관하여 대통령령으로 정한 사항
      ② 개인정보처리자가 개인정보 처리방침을 수립하거나 변경하는 경우에는 정보주체가 쉽게 확인할 수 있도록 대통령령으로 정하는 방법에 따라 공개하여야 한다.
      ③ 개인정보 처리방침의 내용과 개인정보처리자와 정보주체 간에 체결한 계약의 내용이 다른 경우에는 정보주체에게 유리한 것을 적용한다.
      ④ 보호위원회는 개인정보 처리방침의 작성지침을 정하여 개인정보처리자에게 그 준수를 권장할 수 있다. <개정 2013.3.23, 2014.11.19, 2017.7.26, 2020.2.4>

  - id: "PIPA-34"
    name_ko: "개인정보 보호법 제34조"
    name_en: "PIPA Article 34 (Notification of Data Breach)"
    summary: "Requires notification to data subjects in the event of a personal data breach"
    url: "https://www.law.go.kr/법령/개인정보보호법/제34조"
    risk_level: "HIGH"
    full_text_ko: |
      제34조(개인정보 유출 등의 통지ㆍ신고)
      ① 개인정보처리자는 개인정보가 분실ㆍ도난ㆍ유출(이하 이 조에서 "유출등"이라 한다)되었음을 알게 되었을 때에는 지체 없이 해당 정보주체에게 다음 각 호의 사항을 알려야 한다. 다만, 정보주체의 연락처를 알 수 없는 경우 등 정당한 사유가 있는 경우에는 대통령령으로 정하는 바에 따라 통지를 갈음하는 조치를 취할 수 있다. <개정 2023.3.14>
        1. 1.  유출등이 된 개인정보의 항목
        2. 2.  유출등이 된 시점과 그 경위
        3. 3.  유출등으로 인하여 발생할 수 있는 피해를 최소화하기 위하여 정보주체가 할 수 있는 방법 등에 관한 정보
        4. 4.  개인정보처리자의 대응조치 및 피해 구제절차
        5. 5.  정보주체에게 피해가 발생한 경우 신고 등을 접수할 수 있는 담당부서 및 연락처
      ② 개인정보처리자는 개인정보가 유출등이 된 경우 그 피해를 최소화하기 위한 대책을 마련하고 필요한 조치를 하여야 한다. <개정 2023.3.14>
      ③ 개인정보처리자는 개인정보의 유출등이 있음을 알게 되었을 때에는 개인정보의 유형, 유출등의 경로 및 규모 등을 고려하여 대통령령으로 정하는 바에 따라 제1항 각 호의 사항을 지체 없이 보호위원회 또는 대통령령으로 정하는 전문기관에 신고하여야 한다. 이 경우 보호위원회 또는 대통령령으로 정하는 전문기관은 피해 확산방지, 피해 복구 등을 위한 기술을 지원할 수 있다. <개정 2013.3.23, 2014.11.19, 2017.7.26, 2020.2.4, 2023.3.14>
      ④ 제1항에 따른 유출등의 통지 및 제3항에 따른 유출등의 신고의 시기, 방법, 절차 등에 필요한 사항은 대통령령으로 정한다. <개정 2023.3.14>
